<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="-2 -2 52 52">
  <!-- Note head (clock ring) centred at (30, 34), r=9 -->
  <circle cx="30" cy="34" r="9" fill="none" stroke="#000" stroke-width="2.5"/>
  <!-- Clock hands -->
  <line x1="30" y1="34" x2="25" y2="29" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="34" x2="30" y2="28" stroke="#000" stroke-width="1.6" stroke-linecap="round"/>
  <circle cx="30" cy="34" r="1.3" fill="#000"/>
  <!-- Stem from top of note head up -->
  <line x1="39" y1="30" x2="39" y2="10" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Flag -->
  <path d="M39,10 C48,14 48,24 39,26" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cast arcs, top-left, centred on note head (30,34), clear of r=9 ring -->
  <path d="M19,22 A15,15 0 0,0 15,34" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M14,14 A22,22 0 0,0 8,34" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M9,6 A29,29 0 0,0 1,34" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
</svg>
